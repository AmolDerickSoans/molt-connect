<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#EE5A5A"/>
    </linearGradient>
    <linearGradient id="shell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C8C"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- Lobster body -->
  <ellipse cx="256" cy="280" rx="100" ry="130" fill="url(#shell)"/>
  
  <!-- Head -->
  <ellipse cx="256" cy="180" rx="60" ry="50" fill="url(#shell)"/>
  
  <!-- Eyes -->
  <circle cx="230" cy="160" r="20" fill="white"/>
  <circle cx="282" cy="160" r="20" fill="white"/>
  <circle cx="230" cy="160" r="10" fill="#333"/>
  <circle cx="282" cy="160" r="10" fill="#333"/>
  
  <!-- Antennae -->
  <path d="M220 130 Q200 80 180 60" stroke="#CC4444" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M292 130 Q312 80 332 60" stroke="#CC4444" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Claws -->
  <ellipse cx="140" cy="320" rx="50" ry="35" fill="#FF7878" transform="rotate(-30 140 320)"/>
  <ellipse cx="372" cy="320" rx="50" ry="35" fill="#FF7878" transform="rotate(30 372 320)"/>
  
  <!-- Claws detail -->
  <ellipse cx="120" cy="310" rx="25" ry="18" fill="#FF9999" transform="rotate(-30 120 310)"/>
  <ellipse cx="392" cy="310" rx="25" ry="18" fill="#FF9999" transform="rotate(30 392 310)"/>
  
  <!-- Tail segments -->
  <ellipse cx="256" cy="400" rx="40" ry="25" fill="#FF5A5A"/>
  <ellipse cx="256" cy="430" rx="35" ry="22" fill="#FF5A5A"/>
  <ellipse cx="256" cy="455" rx="28" ry="18" fill="#FF5A5A"/>
  
  <!-- Legs -->
  <line x1="180" y1="280" x2="130" y2="350" stroke="#CC4444" stroke-width="10" stroke-linecap="round"/>
  <line x1="332" y1="280" x2="382" y2="350" stroke="#CC4444" stroke-width="10" stroke-linecap="round"/>
  <line x1="190" y1="310" x2="150" y2="380" stroke="#CC4444" stroke-width="10" stroke-linecap="round"/>
  <line x1="322" y1="310" x2="362" y2="380" stroke="#CC4444" stroke-width="10" stroke-linecap="round"/>
</svg>
